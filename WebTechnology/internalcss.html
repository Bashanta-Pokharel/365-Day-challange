<!DOCTYPE html>
<html>
<head>
    <title>Internal CSS Example</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        h1 {
            color: blue;
            text-align: center;
        }

        p {
            color: green;
            font-size: 18px;
        }

        .btn {
            background-color: orange;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>Welcome to My Website</h1>

    <p>This paragraph is styled using internal CSS.</p>

    <button class="btn">Click Me to see styles</button>

</body>
</html>
